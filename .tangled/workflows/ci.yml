when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: "nixery"

steps:
  - name: Run Flake Check
    command: nix flake check

  - name: Check Formatting
    command: nix develop -c cargo fmt --check

  - name: Run Clippy
    command: nix develop -c cargo clippy -- -D warnings

  - name: Build Project
    command: nix develop -c cargo build --release

